<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="styles.css">
    <script src="game.js" defer></script>
</head>
<body>
    <div class="master-container">
        <div class="header-container">
            <p>Tic Tac Toe</p>
        </div>
        <div class="content-container">
            <div class="content-left-panel">
                <p>Player X</p>
                <p class="playerX-score">0</p>
            </div>
            <div class="content-gameboard">
                <div class="content-cell" id="c0"></div>
                <div class="content-cell" id="c1"></div>
                <div class="content-cell" id="c2"></div>
                <div class="content-cell" id="c3"></div>
                <div class="content-cell" id="c4"></div>
                <div class="content-cell" id="c5"></div>
                <div class="content-cell" id="c6"></div>
                <div class="content-cell" id="c7"></div>
                <div class="content-cell" id="c8"></div>
            </div>
            <div class="content-right-panel">
                <p>Player O</p>
                <p class="playerO-score">0</p>
            </div>
        </div>
        <div class="footer-container">
            <p class="footer-message">Player 1's turn</p>
        </div>
    </div>
</body>
</html>

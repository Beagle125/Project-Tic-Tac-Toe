<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="styles.css">
    <script src="game.js" defer></script>
</head>
<body>
    <div class="master-container">
        <div class="header-container">
            <p>Tic Tac Toe</p>
        </div>
        <div class="content-container">
            <div class="content-left-panel">
                <p>Player X</p>
                <p class="playerX-score">0</p>
                <p class="playerX-name">No Name</p>
            </div>
            <div class="content-gameboard">
                <div class="content-cell" id=0></div>
                <div class="content-cell" id=1></div>
                <div class="content-cell" id=2></div>
                <div class="content-cell" id=3></div>
                <div class="content-cell" id=4></div>
                <div class="content-cell" id=5></div>
                <div class="content-cell" id=6></div>
                <div class="content-cell" id=7></div>
                <div class="content-cell" id=8></div>
            </div>
            <div class="content-right-panel">
                <p>Player O</p>
                <p class="playerO-score">0</p>
                <p class="playerO-name">No Name</p>
            </div>
        </div>
        <div class="footer-container">
            <p class="footer-message">Player 1's turn</p>
        </div>
        <dialog id="my-dialog">
            <form id="my-form" method="dialog">
                <label for="player-1-name"></label>
                <input autocomplete="off" type="text" id="P1Name" name="P1Name" placeholder="Player 1 Name" required>
                <label for="player-2-name"></label>
                <input autocomplete="off" type="text" id="P2Name" name="P2Name" placeholder="Player 2 Name" required>
                <button class="submitBtn" type="submit">Start Game</button>
            </form>
        </dialog>
    </div>
</body>
</html>
